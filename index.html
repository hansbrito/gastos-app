<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Gastos</title>
<style>
  :root {
    --bg:#f4f6f8; --card:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --accent:#0f766e; --accent-soft:#ccfbf1; --good:#059669; --bad:#dc2626;
    --radius:16px; --nav-h:64px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0b1220; --card:#141d2f; --text:#e2e8f0; --muted:#8ea0b8; --line:#243247;
            --accent:#2dd4bf; --accent-soft:#134e4a; --good:#34d399; --bad:#f87171; }
  }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom)); }
  main { max-width:520px; margin:0 auto; padding:16px; }
  h1 { font-size:20px; } h2 { font-size:15px; color:var(--muted); font-weight:600; margin:22px 0 10px; }
  .card { background:var(--card); border-radius:var(--radius); padding:16px; box-shadow:0 1px 3px rgba(2,6,23,.06); }
  .muted { color:var(--muted); } .small { font-size:13px; }
  button { font:inherit; border:0; cursor:pointer; }

  /* ---- login ---- */
  .login { min-height:85vh; display:flex; flex-direction:column; justify-content:center; gap:14px; text-align:center; }
  .login .logo { font-size:52px; }
  .login input { width:100%; padding:14px; font-size:17px; border:1px solid var(--line); border-radius:12px; background:var(--card); color:var(--text); }
  .who { display:flex; gap:10px; justify-content:center; }
  .who button { flex:1; padding:13px; border-radius:12px; background:var(--card); border:1px solid var(--line); color:var(--text); font-weight:600; }
  .who button.sel { border-color:var(--accent); background:var(--accent-soft); }
  .primary { background:var(--accent); color:#fff; padding:15px; border-radius:12px; font-size:17px; font-weight:700; width:100%; }
  .primary:disabled { opacity:.5; }

  /* ---- hero ---- */
  .hero { text-align:center; padding:22px 16px; }
  .hero .big { font-size:40px; font-weight:800; letter-spacing:-1px; margin:2px 0; }
  .chip { display:inline-block; padding:4px 12px; border-radius:99px; font-size:13px; font-weight:700; }
  .chip.good { background:color-mix(in srgb, var(--good) 15%, transparent); color:var(--good); }
  .chip.bad  { background:color-mix(in srgb, var(--bad) 15%, transparent); color:var(--bad); }
  .chip.plain{ background:var(--accent-soft); color:var(--accent); }

  /* ---- category rows ---- */
  .catrow { display:flex; align-items:center; gap:10px; padding:9px 0; }
  .catrow .emoji { font-size:20px; width:28px; text-align:center; }
  .catrow .mid { flex:1; min-width:0; }
  .catrow .name { font-weight:600; font-size:14px; display:flex; justify-content:space-between; }
  .bar { height:6px; border-radius:4px; background:var(--line); margin-top:5px; overflow:hidden; }
  .bar i { display:block; height:100%; background:var(--accent); border-radius:4px; }

  /* ---- transactions ---- */
  .tx { display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line); }
  .tx:first-child { border-top:0; }
  .tx .avatar { width:34px; height:34px; border-radius:50%; background:var(--accent-soft); color:var(--accent);
                display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; flex:none; }
  .tx .mid { flex:1; min-width:0; }
  .tx .t1 { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tx .val { font-weight:700; white-space:nowrap; }

  /* ---- charts ---- */
  .chart { width:100%; }
  .chart text { fill:var(--muted); font-size:11px; }
  .chart rect { fill:var(--line); }
  .chart rect.on { fill:var(--accent); }
  .seg { display:flex; background:var(--card); border-radius:12px; padding:4px; gap:4px; margin-bottom:14px; }
  .seg button { flex:1; padding:9px; border-radius:9px; background:transparent; color:var(--muted); font-weight:600; }
  .seg button.sel { background:var(--accent); color:#fff; }

  /* ---- bottom nav ---- */
  nav { position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav-h) + env(safe-area-inset-bottom));
        padding-bottom:env(safe-area-inset-bottom); background:var(--card); border-top:1px solid var(--line);
        display:flex; justify-content:space-around; align-items:center; z-index:10; }
  nav button { background:none; color:var(--muted); font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:2px; width:80px; }
  nav button .ic { font-size:22px; }
  nav button.sel { color:var(--accent); }
  nav .addbtn { width:52px; height:52px; border-radius:50%; background:var(--accent); color:#fff; font-size:30px; line-height:1;
                display:flex; align-items:center; justify-content:center; margin-top:-24px; box-shadow:0 4px 12px rgba(15,118,110,.4); }

  /* ---- add sheet ---- */
  .overlay { position:fixed; inset:0; background:rgba(2,6,23,.5); z-index:20; display:flex; align-items:flex-end; }
  .sheet { background:var(--bg); width:100%; max-width:520px; margin:0 auto; border-radius:20px 20px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom));
           max-height:92vh; overflow-y:auto; }
  .sheet h1 { margin-bottom:14px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:13px; color:var(--muted); font-weight:600; margin-bottom:5px; }
  .field input, .field select { width:100%; padding:13px; font-size:16px; border:1px solid var(--line); border-radius:12px; background:var(--card); color:var(--text); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chips button { padding:8px 12px; border-radius:99px; background:var(--card); border:1px solid var(--line); color:var(--text); font-size:14px; }
  .chips button.sel { background:var(--accent); border-color:var(--accent); color:#fff; }
  .toast { position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg);
           padding:10px 18px; border-radius:99px; font-size:14px; font-weight:600; z-index:40; }
  .center { text-align:center; padding:36px 16px; }
  .linkbtn { background:none; color:var(--muted); text-decoration:underline; font-size:13px; }
</style>
</head>
<body>
<main id="app"><div class="center muted">Carregando…</div></main>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SB_URL = 'https://nvhbuejvuinumxoaagqh.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52aGJ1ZWp2dWludW14b2FhZ3FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3Mzg5NjMsImV4cCI6MjA5OTMxNDk2M30.u_TshYtl51B7f8silMCEkFtmFjmUL2B0OZ-9ErzdTTI'
const ALLOWED = { 'hansmbrito@gmail.com': 'Hans', 'biadamatopsi@gmail.com': 'Bia' }
const CATS = { 'Alimentação':'🍔','Mercado':'🛒','Transporte':'🚗','Moradia':'🏠','Saúde':'💊',
               'Educação':'📚','Lazer':'🎉','Assinaturas':'📺','Vestuário':'👕','Outros':'📦' }
const sb = createClient(SB_URL, SB_KEY)
const $app = document.getElementById('app')

let rows = []            // all expenses, newest first
let tab = 'resumo'       // resumo | relatorios
let repRange = '3m'      // 3m | 12m
let user = null

/* ---------------- helpers ---------------- */
const brl = v => (v ?? 0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' })
const brlShort = v => v >= 1000 ? (v/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'k' : Math.round(v)
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
const monthKey = d => d.slice(0, 7)
const dateOf = r => r.data || (r.received_at || '').slice(0, 10)
const todayISO = () => new Date().toLocaleDateString('sv-SE', { timeZone:'America/Sao_Paulo' })
const monthLabel = (ym, style='long') => new Date(ym + '-15T12:00:00')
  .toLocaleDateString('pt-BR', { month: style, ...(style === 'long' ? { year:'numeric' } : {}) })
const shiftMonth = (ym, n) => { const [y,m] = ym.split('-').map(Number)
  const d = new Date(y, m-1+n, 15); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` }
const sum = a => a.reduce((s,r) => s + Number(r.valor || 0), 0)
const inMonth = ym => rows.filter(r => monthKey(dateOf(r)) === ym)
const toast = (msg) => { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg
  document.body.appendChild(t); setTimeout(() => t.remove(), 2600) }

/* ---------------- auth ---------------- */
async function boot() {
  const { data: { session } } = await sb.auth.getSession()
  handleSession(session)
  sb.auth.onAuthStateChange((_e, s) => handleSession(s))
}
function handleSession(session) {
  user = session?.user ?? null
  if (!user) return renderLogin()
  if (!ALLOWED[user.email]) return renderBlocked()
  loadData()
}
function renderLogin(sent) {
  $app.innerHTML = `
    <div class="login">
      <div class="logo">💰</div>
      <h1 style="font-size:26px">Gastos</h1>
      ${sent ? `
        <p>Enviamos um link de acesso para<br><b>${esc(sent)}</b></p>
        <p class="muted small">Abra o e-mail neste celular e toque no link.<br>Pode levar um minuto para chegar.</p>
        <button class="linkbtn" id="back">usar outro e-mail</button>
      ` : `
        <p class="muted">Quem está entrando?</p>
        <div class="who">
          <button data-em="hansmbrito@gmail.com">Hans</button>
          <button data-em="biadamatopsi@gmail.com">Bia</button>
        </div>
        <button class="primary" id="go" disabled>Receber link por e-mail</button>
        <p class="muted small">Acesso restrito ao casal. Validado pelo seu Gmail.</p>
      `}
    </div>`
  if (sent) { document.getElementById('back').onclick = () => renderLogin(); return }
  let email = null
  for (const b of $app.querySelectorAll('.who button'))
    b.onclick = () => { email = b.dataset.em
      $app.querySelectorAll('.who button').forEach(x => x.classList.toggle('sel', x === b))
      document.getElementById('go').disabled = false }
  document.getElementById('go').onclick = async (e) => {
    e.target.disabled = true; e.target.textContent = 'Enviando…'
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin } })
    if (error) { toast('Erro: ' + error.message); renderLogin() } else renderLogin(email)
  }
}
function renderBlocked() {
  $app.innerHTML = `<div class="center"><div style="font-size:44px">🔒</div>
    <h1>Sem acesso</h1><p class="muted">Este app é só do Hans e da Bia.</p>
    <p style="margin-top:16px"><button class="linkbtn" id="out">sair</button></p></div>`
  document.getElementById('out').onclick = () => sb.auth.signOut()
}

/* ---------------- data ---------------- */
async function loadData() {
  $app.innerHTML = '<div class="center muted">Carregando…</div>'
  const since = shiftMonth(monthKey(todayISO()), -12) + '-01'
  const { data, error } = await sb.from('gastos').select('*').gte('data', since)
    .order('data', { ascending:false }).order('created_at', { ascending:false })
  if (error) { $app.innerHTML = `<div class="center"><p>Erro ao carregar 😕</p><p class="muted small">${esc(error.message)}</p></div>`; return }
  rows = data
  render()
}

/* ---------------- views ---------------- */
function render() {
  $app.innerHTML = (tab === 'resumo' ? viewResumo() : viewRelatorios()) + navHTML()
  bindNav()
  if (tab === 'relatorios') for (const b of $app.querySelectorAll('.seg button'))
    b.onclick = () => { repRange = b.dataset.r; render() }
}

function paceChip() {
  const today = todayISO(), ym = monthKey(today), day = Number(today.slice(8, 10))
  const prevYm = shiftMonth(ym, -1)
  const cur = sum(inMonth(ym))
  const prevSameDay = sum(inMonth(prevYm).filter(r => Number(dateOf(r).slice(8,10)) <= day))
  if (!prevSameDay) return ''
  const d = (cur - prevSameDay) / prevSameDay * 100
  const cls = d <= 0 ? 'good' : 'bad', arrow = d <= 0 ? '↓' : '↑'
  return `<span class="chip ${cls}">${arrow} ${Math.abs(d).toFixed(0)}% vs ${monthLabel(prevYm,'short')} até o dia ${day}</span>`
}

function viewResumo() {
  const today = todayISO(), ym = monthKey(today)
  const cur = inMonth(ym), total = sum(cur)
  const day = Number(today.slice(8, 10))
  const daysInMonth = new Date(Number(ym.slice(0,4)), Number(ym.slice(5,7)), 0).getDate()
  const projection = day >= 3 && total > 0 ? total / day * daysInMonth : null

  // categories, biggest first, with share bars
  const byCat = {}
  for (const r of cur) byCat[r.categoria] = (byCat[r.categoria] || 0) + Number(r.valor)
  const cats = Object.entries(byCat).sort((a,b) => b[1] - a[1])
  const maxCat = cats[0]?.[1] || 1

  const recent = rows.slice(0, 8)
  return `
    <div class="hero">
      <div class="muted">Gastamos em ${monthLabel(ym)}</div>
      <div class="big">${brl(total)}</div>
      ${paceChip()}
      ${projection ? `<div class="muted small" style="margin-top:8px">No ritmo atual: ~${brl(projection)} até o fim do mês</div>` : ''}
    </div>

    <h2>Para onde foi</h2>
    <div class="card">
      ${cats.length ? cats.map(([c, v]) => `
        <div class="catrow">
          <div class="emoji">${CATS[c] || '📦'}</div>
          <div class="mid">
            <div class="name"><span>${esc(c)}</span><span>${brl(v)}</span></div>
            <div class="bar"><i style="width:${(v / maxCat * 100).toFixed(0)}%"></i></div>
          </div>
        </div>`).join('')
      : `<div class="center muted">Nenhum gasto em ${monthLabel(ym,'short')} ainda.<br class="small">Envie um comprovante no grupo 💬 ou toque no +</div>`}
    </div>

    <h2>Últimos lançamentos</h2>
    <div class="card">
      ${recent.length ? recent.map(txHTML).join('') : '<div class="center muted">Nada ainda.</div>'}
    </div>
    <p class="center"><button class="linkbtn" id="out">sair (${esc(ALLOWED[user.email])})</button></p>`
}

function txHTML(r) {
  const d = dateOf(r)
  const initial = (r.sender || '?').trim()[0]?.toUpperCase() || '?'
  return `<div class="tx">
    <div class="avatar">${esc(initial)}</div>
    <div class="mid">
      <div class="t1">${esc(r.estabelecimento || r.descricao || '—')}</div>
      <div class="muted small">${d.slice(8,10)}/${d.slice(5,7)} · ${CATS[r.categoria] || ''} ${esc(r.categoria)} · ${esc(r.metodo || '')}</div>
    </div>
    <div class="val">${brl(Number(r.valor))}</div>
  </div>`
}

function barChart(items) { // [{label, value, on}]
  const W = 480, H = 190, pad = 8, bw = (W - pad*2) / items.length
  const max = Math.max(...items.map(i => i.value), 1)
  const bars = items.map((it, i) => {
    const h = Math.max(it.value / max * (H - 58), it.value > 0 ? 3 : 0)
    const x = pad + i*bw + bw*0.14, y = H - 34 - h
    return `<rect class="${it.on ? 'on' : ''}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw*0.72).toFixed(1)}" height="${h.toFixed(1)}" rx="5"/>
      <text x="${(pad + i*bw + bw/2).toFixed(1)}" y="${H-18}" text-anchor="middle">${esc(it.label)}</text>
      ${it.value > 0 ? `<text x="${(pad + i*bw + bw/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-weight="700">${brlShort(it.value)}</text>` : ''}`
  }).join('')
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${bars}</svg>`
}

function viewRelatorios() {
  const ym = monthKey(todayISO())
  const n = repRange === '3m' ? 4 : 12   // 3m view shows current + 3 previous
  const months = Array.from({length:n}, (_, i) => shiftMonth(ym, -(n-1-i)))
  const totals = months.map(m => ({ label: monthLabel(m,'short').replace('.',''), value: sum(inMonth(m)), on: m === ym }))
  const period = rows.filter(r => monthKey(dateOf(r)) >= months[0])
  const totalPeriod = sum(period)
  const monthsWithData = new Set(period.map(r => monthKey(dateOf(r)))).size || 1

  const byCat = {}
  for (const r of period) byCat[r.categoria] = (byCat[r.categoria] || 0) + Number(r.valor)
  const cats = Object.entries(byCat).sort((a,b) => b[1] - a[1])
  const maxCat = cats[0]?.[1] || 1

  return `
    <div style="height:10px"></div>
    <div class="seg">
      <button data-r="3m" class="${repRange==='3m'?'sel':''}">Últimos 3 meses</button>
      <button data-r="12m" class="${repRange==='12m'?'sel':''}">12 meses</button>
    </div>
    <div class="card">
      ${barChart(totals)}
      <div style="display:flex; justify-content:space-around; text-align:center; border-top:1px solid var(--line); padding-top:12px">
        <div><div class="muted small">Total período</div><b>${brl(totalPeriod)}</b></div>
        <div><div class="muted small">Média/mês</div><b>${brl(totalPeriod / monthsWithData)}</b></div>
      </div>
    </div>
    <h2>Por categoria no período</h2>
    <div class="card">
      ${cats.length ? cats.map(([c, v]) => `
        <div class="catrow">
          <div class="emoji">${CATS[c] || '📦'}</div>
          <div class="mid">
            <div class="name"><span>${esc(c)}</span><span>${brl(v)}</span></div>
            <div class="bar"><i style="width:${(v / maxCat * 100).toFixed(0)}%"></i></div>
          </div>
          <div class="muted small" style="width:64px;text-align:right">${brl(v / monthsWithData)}/mês</div>
        </div>`).join('') : '<div class="center muted">Sem dados no período.</div>'}
    </div>`
}

/* ---------------- add expense ---------------- */
function openAdd() {
  const ov = document.createElement('div')
  ov.className = 'overlay'
  ov.innerHTML = `<div class="sheet">
    <h1>Novo gasto</h1>
    <div class="field"><label>Valor (R$)</label>
      <input id="f-valor" type="number" inputmode="decimal" step="0.01" min="0.01" placeholder="0,00" autofocus></div>
    <div class="field"><label>Onde / com quem</label>
      <input id="f-estab" type="text" placeholder="ex.: Mercado Carrefour"></div>
    <div class="field"><label>Categoria</label>
      <div class="chips">${Object.entries(CATS).map(([c, e]) =>
        `<button data-c="${c}">${e} ${c}</button>`).join('')}</div></div>
    <div class="field"><label>Data</label><input id="f-data" type="date" value="${todayISO()}"></div>
    <div class="field"><label>Método</label>
      <select id="f-metodo"><option>Pix</option><option>crédito</option><option>débito</option><option>dinheiro</option><option>boleto</option><option>outro</option></select></div>
    <button class="primary" id="f-save">Salvar</button>
    <p class="center" style="margin-top:10px"><button class="linkbtn" id="f-cancel">cancelar</button></p>
  </div>`
  document.body.appendChild(ov)
  let cat = null
  for (const b of ov.querySelectorAll('.chips button'))
    b.onclick = () => { cat = b.dataset.c
      ov.querySelectorAll('.chips button').forEach(x => x.classList.toggle('sel', x === b)) }
  ov.querySelector('#f-cancel').onclick = () => ov.remove()
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove() })
  ov.querySelector('#f-save').onclick = async (e) => {
    const valor = parseFloat(ov.querySelector('#f-valor').value.replace(',', '.'))
    const estab = ov.querySelector('#f-estab').value.trim()
    const data = ov.querySelector('#f-data').value
    if (!valor || valor <= 0) return toast('Informe o valor')
    if (!estab) return toast('Informe onde foi o gasto')
    if (!cat) return toast('Escolha uma categoria')
    e.target.disabled = true; e.target.textContent = 'Salvando…'
    const rec = { id: 'app-' + crypto.randomUUID(), received_at: new Date().toISOString(),
      sender: ALLOWED[user.email], data, valor, estabelecimento: estab, categoria: cat,
      metodo: ov.querySelector('#f-metodo').value, descricao: 'adicionado pelo app' }
    const { error } = await sb.from('gastos').insert(rec)
    if (error) { toast('Erro: ' + error.message); e.target.disabled = false; e.target.textContent = 'Salvar'; return }
    ov.remove(); toast('✔ Gasto registrado')
    rows.unshift(rec); rows.sort((a,b) => dateOf(b).localeCompare(dateOf(a))); render()
  }
}

/* ---------------- nav ---------------- */
const navHTML = () => `<nav>
  <button data-t="resumo" class="${tab==='resumo'?'sel':''}"><span class="ic">🏠</span>Resumo</button>
  <button class="addbtn" id="add">+</button>
  <button data-t="relatorios" class="${tab==='relatorios'?'sel':''}"><span class="ic">📊</span>Relatórios</button>
</nav>`
function bindNav() {
  for (const b of $app.querySelectorAll('nav [data-t]'))
    b.onclick = () => { tab = b.dataset.t; render(); scrollTo(0, 0) }
  $app.querySelector('#add').onclick = openAdd
  const out = $app.querySelector('#out')
  if (out) out.onclick = () => sb.auth.signOut()
}

boot()
</script>
</body>
</html>
